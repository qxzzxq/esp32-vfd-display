; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; env:native is test-only (no app main()); a bare `pio run` must not build it
default_envs = seeed_xiao_esp32c3

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = espidf

; Host-only test suites live under test/native/ and are run with the native
; env below; ignore them here so a stray `pio test` on this env is a no-op
test_ignore = native/*

; PlatformIO's espidf builder takes the partition table from board_build.partitions
; (NOT from sdkconfig CONFIG_PARTITION_TABLE_*), so the 1.5 MB app slot must be set here
board_build.partitions = partitions_singleapp_large.csv

; Use the built-in USB JTAG interface for uploading and debugging
upload_protocol = esp-builtin
debug_tool = esp-builtin

; Work around broken tool-openocd-esp32 package (the platform's pinned zip is
; metadata-only, no binary): use the complete local copy under ~/.platformio/tools.
platform_packages =
    tool-openocd-esp32@symlink://${platformio.core_dir}/tools/tool-openocd-esp32

; Host unit tests for the pure UI core (src/ui/ has no ESP-IDF dependencies):
;   ~/.platformio/penv/bin/pio test -e native
[env:native]
platform = native
test_framework = unity
test_filter = native/*
; Compile project sources into the test program, but ONLY the pure core —
; everything else in src/ needs the ESP-IDF toolchain
test_build_src = yes
build_src_filter = +<ui/>
build_flags = -std=gnu++17 -Wall -Wextra